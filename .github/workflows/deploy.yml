name: Deploy Volunteer Services

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build with Maven
        run: mvn clean install -DskipTests

      - name: Setup SSH and copy jars
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p 2222 47.118.24.242 >> ~/.ssh/known_hosts 2>/dev/null

          # 模块和 jar 路径对照
          declare -A modules
          modules["Gateway/gateway-service"]="Gateway/gateway-service"
          modules["User-server/user-service"]="User-server/user-service"
          modules["Activity-server/activity-service"]="Activity-server/activity-service"
          modules["CheckIn-server/CheckIn-service"]="CheckIn-server/CheckIn-service"
          modules["Points-server/Points-service"]="Points-server/Points-service"
          modules["Review-server/review-service"]="Review-server/review-service"
          modules["Registration-server/registration-service"]="Registration-server/registration-service"
          modules["AI-server/SpringAi-be"]="AI-server/SpringAi-be"
          modules["Message-server/Message-service"]="Message-server/Message-service"
          modules["Volunteer-Common"]="Volunteer-Common"
          modules["Volunteer-Api"]="Volunteer-Api"

          for path in "${!modules[@]}"; do
            if [ -f "$path/target/"*.jar ]; then
              echo "Copying $path..."
              ssh root@${{ secrets.SERVER_HOST }} -p 2222 -i ~/.ssh/id_rsa "mkdir -p /opt/volunteer/$path/target"
              scp -P 2222 -i ~/.ssh/id_rsa "$path/target/"*.jar root@${{ secrets.SERVER_HOST }}:/opt/volunteer/$path/target/
            fi
          done
          echo "All jars copied!"
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 47.118.24.242
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 2222
          script: |
            cd /opt/volunteer
            docker compose down
            docker compose up -d --build