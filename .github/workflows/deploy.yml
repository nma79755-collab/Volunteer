name: Deploy Volunteer Services

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build with Maven
        run: mvn clean install -DskipTests

      - name: Setup SSH and copy jars
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p 2222 47.118.24.242 >> ~/.ssh/known_hosts 2>/dev/null
          echo "Copying jars..."
          for dir in */; do
            module=${dir%/}
            if [ -f "$module/target/"*.jar ]; then
              echo "  Copying $module..."
              scp -P 2222 -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa "$module/target/"*.jar root@$47.118.24.242:/opt/volunteer/$module/target/
            fi
          done
          echo "All jars copied!"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 47.118.24.242
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 2222
          script: |
            cd /opt/volunteer
            docker compose down
            docker compose up -d --build