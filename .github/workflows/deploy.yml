- name: Deploy via SSH
  uses: appleboy/ssh-action@v1.0.3
  with:
    host: 47.118.24.242
    username: root
    password: ${{ secrets.SSH_PASSWORD }}
    port: 2222
    script: |
      cd /opt/volunteer
      git pull origin main
      mvn clean package -DskipTests
      docker compose down
      docker compose up -d --build